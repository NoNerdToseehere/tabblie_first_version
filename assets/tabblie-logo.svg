<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 110" fill="none" role="img" aria-label="Tabblie">
  <title>Tabblie</title>
  <!-- Oval ring: stroke only, no fill — so text inside is visible against any background -->
  <ellipse cx="160" cy="55" rx="152" ry="48"
           stroke="#E8622A" stroke-width="4.5" fill="none"/>

  <!-- "Tabblie" — capital T, lightweight, generous tracking, centered in oval -->
  <text
    x="160"
    y="71"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="44"
    font-weight="400"
    letter-spacing="4"
    fill="#E8622A">Tabblie</text>
</svg>
